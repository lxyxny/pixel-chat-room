<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 Pixel Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pixel-container">
    
    <!-- START MENU -->
    <div id="start-screen" class="screen active">
      <h1 class="pixel-title">PIXEL CHAT</h1>
      <div class="pixel-box start-menu">
        <button id="join-room-btn" class="pixel-btn">🚪 JOIN ROOM</button>
        <button id="host-room-btn" class="pixel-btn">🏠 HOST ROOM</button>
        <button id="customize-btn" class="pixel-btn">🎨 CUSTOMIZE</button>
      </div>
      <p class="pixel-hint">Choose your adventure!</p>
      <p class="pixel-hint" id="server-url"></p>
    </div>

    <!-- ROOM SCREEN -->
    <div id="room-screen" class="screen">
      <h1 class="pixel-title" id="room-title">JOIN ROOM</h1>
      <div class="pixel-box">
        <input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="12" autocomplete="off"/>
        <input type="text" id="room-input" placeholder="ROOM CODE..." maxlength="16" autocomplete="off"/>
        <button id="enter-room-btn" class="pixel-btn">▶ ENTER</button>
        <button id="back-to-start-btn" class="pixel-btn">↩ BACK</button>
      </div>
      <p class="pixel-hint">Press ENTER to join</p>
    </div>

    <!-- CUSTOMIZE SCREEN -->
    <div id="customize-screen" class="screen">
      <h1 class="pixel-title">CUSTOMIZE</h1>
      <div class="pixel-box customize-box">
        <div class="customize-section">
          <h3 class="pixel-label">NAME COLOR</h3>
          <input type="color" id="name-color-picker" value="#4cc9f0" />
          <div class="color-preview" id="name-color-preview"></div>
        </div>
        
        <div class="customize-section">
          <h3 class="pixel-label">BUTTON COLOR</h3>
          <input type="color" id="button-color-picker" value="#e94560" />
          <div class="color-preview" id="button-color-preview"></div>
        </div>
        
        <div class="customize-section">
          <h3 class="pixel-label">BACKGROUND COLOR</h3>
          <input type="color" id="bg-color-picker" value="#1a1a2e" />
          <div class="color-preview" id="bg-color-preview"></div>
        </div>
        
        <div class="customize-section">
          <h3 class="pixel-label">BACKGROUND IMAGE</h3>
          <input type="text" id="bg-image-url" placeholder="Paste image URL..." />
          <label for="bg-image-upload" class="pixel-btn small">📁 UPLOAD IMAGE</label>
          <input type="file" id="bg-image-upload" accept="image/*" hidden />
          <button id="clear-bg-image-btn" class="pixel-btn small">🗑️ CLEAR</button>
          <div class="color-preview" id="bg-image-preview"></div>
        </div>
        
        <div class="customize-section">
          <h3 class="pixel-label">PANEL COLOR</h3>
          <input type="color" id="panel-color-picker" value="#16213e" />
          <div class="color-preview" id="panel-color-preview"></div>
        </div>
        
        <button id="save-colors-btn" class="pixel-btn">💾 SAVE</button>
        <button id="reset-colors-btn" class="pixel-btn">🔄 RESET</button>
        <button id="back-to-start-customize-btn" class="pixel-btn">↩ BACK</button>
      </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen" class="screen">
      <div class="chat-header">
        <h2 class="pixel-subtitle">ROOM: <span id="room-display">---</span></h2>
        <div class="header-actions">
          <button id="soundboard-btn" class="pixel-btn small" title="Soundboard">🎵</button>
          <button id="sound-toggle" class="pixel-btn small" title="Toggle Sound">🔊</button>
          <span id="typing-indicator" class="typing-indicator hidden"></span>
          <button id="leave-btn" class="pixel-btn small">✕ LEAVE</button>
        </div>
      </div>
      
      <div class="chat-layout">
        <!-- Main Chat Area -->
        <div class="main-chat">
          <div class="chat-tabs">
            <button class="tab-btn active" data-tab="main">💬 MAIN</button>
            <button class="tab-btn" data-tab="threads">🧵 THREADS</button>
            <button class="tab-btn" data-tab="dms">📩 DMS</button>
          </div>
          
          <!-- Main Chat -->
          <div id="main-chat-panel" class="chat-panel active">
            <div id="messages" class="pixel-messages"></div>
            <div id="reply-preview" class="reply-preview hidden">
              <span>REPLYING TO: <strong id="reply-username"></strong></span>
              <button id="cancel-reply" class="pixel-btn tiny">✕</button>
            </div>
            <div class="input-area">
              <label for="image-upload" class="pixel-btn icon-btn" title="Upload">🖼️</label>
              <input type="file" id="image-upload" accept="image/*" hidden />
              <input type="text" id="message-input" placeholder="TYPE MESSAGE..." maxlength="500"/>
              <button id="send-btn" class="pixel-btn">▶ SEND</button>
            </div>
            <p class="pixel-hint">*italic* **bold** ***both*** | Double-click to reply</p>
          </div>
          
          <!-- Threads Panel -->
          <div id="threads-panel" class="chat-panel">
            <div id="threads-list" class="threads-list"></div>
            <div id="thread-view" class="thread-view hidden">
              <div class="thread-header">
                <button id="close-thread-btn" class="pixel-btn small">← BACK</button>
                <h3 id="thread-name" class="thread-name"></h3>
              </div>
              <div id="thread-messages" class="thread-messages"></div>
              <div class="thread-input">
                <input type="text" id="thread-message-input" placeholder="Reply in thread..."/>
                <button id="send-thread-btn" class="pixel-btn small">SEND</button>
              </div>
            </div>
          </div>
          
          <!-- DMs Panel -->
          <div id="dms-panel" class="chat-panel">
            <div id="dm-users-list" class="dm-users-list"></div>
            <div id="dm-chat" class="dm-chat hidden">
              <div class="dm-header">
                <button id="close-dm-btn" class="pixel-btn small">← BACK</button>
                <h3 id="dm-username" class="dm-username"></h3>
              </div>
              <div id="dm-messages" class="dm-messages"></div>
              <div class="dm-input">
                <input type="text" id="dm-message-input" placeholder="Send private message..."/>
                <button id="send-dm-btn" class="pixel-btn small">SEND</button>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="sidebar-section">
            <h3 class="pixel-label">PLAYERS <span id="user-count">0</span></h3>
            <ul id="user-list" class="pixel-list"></ul>
          </div>
          
          <!-- Soundboard Panel -->
          <div id="soundboard-panel" class="soundboard-panel hidden">
            <h3 class="pixel-label">🎵 SOUNDBOARD</h3>
            <div class="sound-buttons">
              <button class="sound-btn" data-sound="airhorn">📯</button>
              <button class="sound-btn" data-sound="bruh">😒</button>
              <button class="sound-btn" data-sound="wow">😮</button>
              <button class="sound-btn" data-sound="laugh">😂</button>
              <button class="sound-btn" data-sound="clap">👏</button>
              <button class="sound-btn" data-sound="sad">😢</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Load saved colors IMMEDIATELY
    const savedColors = localStorage.getItem('pixelChatColors');
    if (savedColors) {
      try {
        const colors = JSON.parse(savedColors);
        document.documentElement.style.setProperty('--pixel-success', colors.nameColor || '#4cc9f0');
        document.documentElement.style.setProperty('--pixel-accent', colors.buttonColor || '#e94560');
        document.documentElement.style.setProperty('--pixel-bg', colors.bgColor || '#1a1a2e');
        document.documentElement.style.setProperty('--pixel-panel', colors.panelColor || '#16213e');
        
        if (colors.bgImage) {
          document.body.style.backgroundImage = `url(${colors.bgImage})`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundPosition = 'center';
          document.body.style.backgroundAttachment = 'fixed';
        }
      } catch(e) {
        console.error('Error loading colors:', e);
      }
    }
    
    // Show server URL
    const serverUrlEl = document.getElementById('server-url');
    if (serverUrlEl && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      serverUrlEl.textContent = `🌐 ${window.location.origin}`;
    }
    
    // Initialize audio
    window.audioContext = null;
    window.audioEnabled = false;
    
    document.addEventListener('click', () => {
      if (!window.audioContext) {
        try {
          window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          window.audioEnabled = true;
        } catch(e) { console.warn('Audio not supported'); }
      }
    }, { once: true });
    
    document.addEventListener('keydown', () => {
      if (!window.audioContext) {
        try {
          window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          window.audioEnabled = true;
        } catch(e) { console.warn('Audio not supported'); }
      }
    }, { once: true });
  </script>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
