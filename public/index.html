<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 Pixel Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pixel-container">
    <div id="login-screen" class="screen active">
      <h1 class="pixel-title">PIXEL CHAT</h1>
      <div class="pixel-box">
        <input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="12" autocomplete="off"/>
        <input type="text" id="room-input" placeholder="ROOM CODE..." maxlength="16" autocomplete="off"/>
        <button id="join-btn" class="pixel-btn">▶ JOIN</button>
      </div>
      <p class="pixel-hint">Press ENTER to join</p>
    </div>

    <div id="chat-screen" class="screen">
      <div class="chat-header">
        <h2 class="pixel-subtitle">ROOM: <span id="room-display">---</span></h2>
        <button id="leave-btn" class="pixel-btn small">✕ LEAVE</button>
      </div>
      
      <div class="chat-layout">
        <div class="messages-panel">
          <div id="messages" class="pixel-messages"></div>
          <div class="input-area">
            <input type="text" id="message-input" placeholder="TYPE MESSAGE..." maxlength="200" autocomplete="off"/>
            <button id="send-btn" class="pixel-btn">▶ SEND</button>
          </div>
        </div>
        
        <div class="users-panel">
          <h3 class="pixel-label">PLAYERS</h3>
          <ul id="user-list" class="pixel-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
